name: Bug Report
description: Report a bug or unexpected behavior

body:
  - type: dropdown
    id: macos-version
    attributes:
      label: macOS Version
      options:
        - "15 Sequoia"
        - "14 Sonoma"
    validations:
      required: true

  - type: input
    id: app-version
    attributes:
      label: WiFi Guard Version
      placeholder: "e.g. 1.0.0"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: "1. Open the app\n2. Click on...\n3. ..."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      placeholder: Describe what you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      placeholder: Describe what actually happened.
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots
      placeholder: Paste any relevant logs or attach screenshots.
    validations:
      required: false
