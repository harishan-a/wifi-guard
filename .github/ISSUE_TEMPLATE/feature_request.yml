name: Feature Request
description: Suggest a new feature or improvement

body:
  - type: textarea
    id: description
    attributes:
      label: Description
      placeholder: Describe the feature you would like to see.
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      placeholder: Explain why this feature would be useful.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      placeholder: Describe any alternative solutions or features you have considered.
    validations:
      required: false
